name: frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  http: ^1.1.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.4
  file_picker: ^8.0.0
  cached_network_image: ^3.3.0
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  intl: any
  url_launcher: ^6.2.1
  badges: ^3.1.2
  flutter_localizations:
    sdk: flutter
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  firebase_core: 2.13.0
  firebase_auth: 4.6.1
  cloud_firestore: 4.7.1
  firebase_storage: 11.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
