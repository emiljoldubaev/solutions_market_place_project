<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Marketplace</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .login-card { max-width: 400px; width: 100%; border-radius: 10px; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="card login-card shadow-sm border-0">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
                <h4 class="fw-bold mt-2">Admin Access</h4>
                <p class="text-muted small">Sign in to manage the marketplace</p>
            </div>
            
            <!-- Flash Messages -->
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.category }} alert-dismissible fade show" role="alert">
                    {{ message.text }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endfor %}
            {% endif %}

            <form action="/admin/login" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-medium text-dark">Email address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" class="form-control bg-light" name="email" required placeholder="admin@marketplace.com">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium text-dark">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-key text-muted"></i></span>
                        <input type="password" class="form-control bg-light" name="password" required placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-medium">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Secure Login
                </button>
            </form>
        </div>
    </div>
    
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
