<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %} - Marketplace</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .sidebar { min-height: 100vh; }
        .nav-link { color: #495057; font-weight: 500; padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 2px; }
        .nav-link.active { color: #0d6efd; background-color: #e9ecef; }
        .nav-link:hover:not(.active) { background-color: #f8f9fa; color: #0d6efd; }
        .main-content { background-color: #f8f9fa; min-height: 100vh; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block bg-white sidebar py-4 border-end shadow-sm">
                <div class="position-sticky">
                    <h4 class="text-center text-primary mb-4 fw-bold">
                        <i class="bi bi-shop"></i> Admin Panel
                    </h4>
                    <ul class="nav flex-column px-3 gap-1">
                        <li class="nav-item">
                            <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/admin/dashboard">
                                <i class="bi bi-speedometer2 me-2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active_page == 'users' %}active{% endif %}" href="/admin/users">
                                <i class="bi bi-people me-2"></i> Users
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active_page == 'listings' %}active{% endif %}" href="/admin/listings">
                                <i class="bi bi-box-seam me-2"></i> Listings
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active_page == 'reports' %}active{% endif %}" href="/admin/reports">
                                <i class="bi bi-flag me-2"></i> Reports
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active_page == 'categories' %}active{% endif %}" href="/admin/categories">
                                <i class="bi bi-tags me-2"></i> Categories
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active_page == 'payments' %}active{% endif %}" href="/admin/payments">
                                <i class="bi bi-credit-card me-2"></i> Payments
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active_page == 'promotions' %}active{% endif %}" href="/admin/promotions">
                                <i class="bi bi-star me-2"></i> Promotions
                            </a>
                        </li>
                    </ul>
                    <hr class="mx-3 mt-4 mb-3">
                    <div class="px-3">
                        <a href="/admin/logout" class="btn btn-outline-danger w-100">
                            <i class="bi bi-box-arrow-right me-2"></i> Logout
                        </a>
                    </div>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4 main-content">
                <!-- Flash Messages -->
                {% if messages %}
                    {% for message in messages %}
                    <div class="alert alert-{{ message.category }} alert-dismissible fade show shadow-sm" role="alert">
                        {{ message.text }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% endfor %}
                {% endif %}

                <!-- Content Block -->
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
